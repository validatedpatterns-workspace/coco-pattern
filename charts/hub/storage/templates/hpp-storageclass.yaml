{{- if eq .Values.global.storageProvider "hpp" }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.hpp.storageClass.name | default "hostpath-csi" }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: kubevirt.io.hostpath-provisioner
reclaimPolicy: {{ .Values.hpp.storageClass.reclaimPolicy | default "Delete" }}
volumeBindingMode: {{ .Values.hpp.storageClass.volumeBindingMode | default "WaitForFirstConsumer" }}
parameters:
  storagePool: local
{{- end }}
