{{- if eq .Values.global.storageProvider "lvm" }}
apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: {{ .Values.lvmCluster.name | default "lvmcluster" }}
  namespace: openshift-storage
spec:
  storage:
    deviceClasses:
    - name: {{ .Values.lvmCluster.deviceClass | default "vg1" }}
      thinPoolConfig:
        name: thin-pool-1
        sizePercent: 90
        overprovisionRatio: 10
{{- end }}
