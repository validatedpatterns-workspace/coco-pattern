---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tdx-qgs-service-account
  namespace: intel-dcap
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: tdx-qgs-scc
  annotations:
    kubernetes.io/description: "SCC for Intel TDX Quote Generation Service requiring host network access and SGX devices"
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: true
allowedCapabilities:
- LINUX_IMMUTABLE
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities:
- KILL
- MKNOD
- SETPCAP
- SYS_CHROOT
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:intel-dcap:tdx-qgs-service-account
volumes:
- configMap
- downwardAPI
- emptyDir
- hostPath
- persistentVolumeClaim
- projected
- secret
