---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pccs
  namespace: intel-dcap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pccs
  template:
    metadata:
      labels:
        app: pccs
        trustedservices.intel.com/cache: pccs
    spec:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
      serviceAccountName: pccs-service-account
      {{- if .Values.baremetal.pccs.nodeSelector }}
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.baremetal.pccs.nodeSelector }}
      {{- end }}
      initContainers:
        - name: init-seclabel
          image: registry.access.redhat.com/ubi9/ubi:9.7-1764578509
          command: [ "sh", "-c", "chcon -Rt container_file_t /var/cache/pccs" ]
          volumeMounts:
            - name: host-database
              mountPath: /var/cache/pccs
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true  # Required for chcon to work on host files
      containers:
        - name: pccs
          image: registry.redhat.io/openshift-sandboxed-containers/osc-pccs@sha256:edf57087220516115512dc6687b96045cbc69472a3d6d381619f66beae032ad6
          envFrom:
            - secretRef:
                name: pccs-secrets
          env:
            - name: "PCCS_LOG_LEVEL"
              value: "info"
            - name: "CLUSTER_HTTPS_PROXY"
              value: ""
            - name: "PCCS_FILL_MODE"
              value: "LAZY"
          ports:
            - containerPort: 8042
              name: pccs-port
          volumeMounts:
            - name: pccs-tls
              mountPath: /opt/intel/pccs/ssl_key
              readOnly: true
            - name: host-database
              mountPath: /var/cache/pccs/
          securityContext:
            runAsUser: 0
      volumes:
        - name: pccs-tls
          secret:
            secretName: pccs-tls
        - name: host-database
          hostPath:
            path: /var/cache/pccs/
            type: DirectoryOrCreate
