---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pccs-service-account
  namespace: intel-dcap
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: pccs-scc
  annotations:
    kubernetes.io/description: "SCC for Intel DCAP PCCS service requiring privileged access and hostPath volumes"
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: true
allowedCapabilities:
- DAC_OVERRIDE
- SETGID
- SETUID
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities:
- KILL
- MKNOD
- SETPCAP
- SYS_CHROOT
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:intel-dcap:pccs-service-account
volumes:
- configMap
- downwardAPI
- emptyDir
- hostPath
- persistentVolumeClaim
- projected
- secret
