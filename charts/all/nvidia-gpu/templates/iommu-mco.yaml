{{- if .Values.iommu.enabled }}
{{- range list "master" "worker" }}
---
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: {{ . }}
  name: 100-iommu-{{ . }}
spec:
  kernelArguments:
  - amd_iommu=on
  - intel_iommu=on
{{- end }}
{{- end }}
