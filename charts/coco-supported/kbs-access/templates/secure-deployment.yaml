apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure
  labels:
    app: secure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure
  template:
    metadata:
      labels:
        app: secure
      annotations:
        peerpods: "true"
        coco.io/initdata-configmap: initdata
        {{- if .Values.defaultMemory }}
        io.katacontainers.config.hypervisor.default_memory: {{ .Values.defaultMemory | quote }}
        {{- end }}
    spec:
      runtimeClassName: {{ if .Values.runtimeClassName }}{{ .Values.runtimeClassName }}{{ else if or (eq .Values.global.clusterPlatform "Azure") (eq .Values.global.clusterPlatform "AWS") }}kata-remote{{ else }}kata-cc{{ end }}
      containers:
        - name: python-access
          image: ghcr.io/butler54/kbs-access-app:latest
          ports:
            - containerPort: 5000
          volumeMounts:
          - name: output-volume
            mountPath: /output
          envFrom:
          - configMapRef:
              name: kbsref
      initContainers:
      - name: curl
        image: registry.access.redhat.com/ubi9/ubi:latest
        command: ['sh', '-c', 'curl -s http://127.0.0.1:8006/cdh/resource/default/kbsres1/key3 > /output/kbsres1.txt']
        volumeMounts:
        - name: output-volume
          mountPath: /output
      volumes:
      - name: output-volume
        emptyDir: {}
